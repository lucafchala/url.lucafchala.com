<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>url.lucafchala.com</title><meta name="theme-color" content="#0d0c0a">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script>(function(){document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark'})()</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0c0a;--border:#252220;--text:#e6e1d6;--muted:#6a6358;--accent:#c08030;--accent-dim:#6a4818;--ctrl-bg:#161412}
[data-theme=light]{--bg:#f4efe6;--border:#d8d1c4;--text:#1c1a17;--muted:#9a8f80;--accent:#a06820;--accent-dim:#c89050;--ctrl-bg:#ede8df}
html{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.75;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
body{min-height:100vh;max-width:720px;margin:0 auto;padding:48px 32px 72px}
.controls{display:flex;justify-content:flex-end;margin-bottom:24px}
.controls-inner{display:flex;align-items:center;gap:4px;background:var(--ctrl-bg);border:1px solid var(--border);border-radius:3px;padding:4px 6px;transition:background .25s,border-color .25s}
.ctrl-btn{background:none;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.09em;text-transform:uppercase;padding:4px 7px;cursor:pointer;transition:color .15s;border-radius:2px;line-height:1}
.ctrl-btn:hover{color:var(--accent)}
#btn-theme{font-size:15px;padding:2px 7px}
header{margin-bottom:52px;animation:rise .9s cubic-bezier(.16,1,.3,1) both}
.name{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,10vw,72px);font-weight:300;line-height:.92;letter-spacing:-.025em;margin-bottom:18px}
.micro{color:var(--muted);font-size:10px;letter-spacing:.14em;text-transform:uppercase}
.rule{display:flex;align-items:center;gap:16px;margin:36px 0;color:var(--muted);font-size:10px;letter-spacing:.1em}
.rule::before,.rule::after{content:'';flex:1;height:1px;background:var(--border)}
/* hubs */
.hubs-section{margin-bottom:8px;animation:rise .9s cubic-bezier(.16,1,.3,1) .05s both}
.hubs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.hub{display:flex;flex-direction:column;gap:4px;padding:12px 14px;border:1px solid var(--border);border-radius:3px;background:var(--ctrl-bg);text-decoration:none;transition:border-color .15s,background .15s}
.hub:hover{border-color:var(--accent-dim);background:var(--bg)}
.hub-name{font-size:11px;color:var(--text);letter-spacing:.04em}
.hub-sub{font-size:10px;color:var(--muted)}
/* redirects */
.redirects-section{animation:rise .9s cubic-bezier(.16,1,.3,1) .12s both}
.tagline{color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.micro{color:var(--muted);font-size:10px;letter-spacing:.14em;text-transform:uppercase}
.rule{display:flex;align-items:center;gap:16px;margin:36px 0;color:var(--muted);font-size:10px;letter-spacing:.1em}
.rule::before,.rule::after{content:'';flex:1;height:1px;background:var(--border)}
.section-label{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.redirects-section{animation:rise .9s cubic-bezier(.16,1,.3,1) .1s both}
.group-header{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:16px 0 8px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.group-header::after{content:'';flex:1;height:1px;background:var(--border)}
.group-header:first-child{padding-top:8px}
.group-header:hover{color:var(--text)}
.group-toggle{font-size:8px;flex-shrink:0;transition:transform .2s;color:var(--muted)}
.group-header.collapsed .group-toggle{transform:rotate(-90deg)}
.group-items{overflow:hidden}
.group-items.collapsed{display:none}
.group-count{font-size:8px;color:var(--muted);opacity:.7}
.redirect-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.redirect-item:last-child{border-bottom:none}
.redirect-slug{font-size:12px;color:var(--accent);flex-shrink:0}
.redirect-dest{font-size:11px;color:var(--muted);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.redirect-actions{display:flex;gap:5px;flex-shrink:0}
.act-btn{background:none;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:3px 7px;cursor:pointer;transition:color .15s,border-color .15s;text-decoration:none;display:inline-flex;align-items:center;line-height:1.2}
.act-btn:hover{color:var(--text);border-color:var(--accent-dim)}
.act-btn.ok{color:var(--accent);border-color:var(--accent-dim)}
.empty{padding:20px 0;color:var(--muted);font-size:11px;text-align:center}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:680px){.hubs-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:540px){body{padding:32px 22px 52px}.hubs-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:380px){.redirect-dest{display:none}.hubs-grid{grid-template-columns:1fr}}
@media(max-width:540px){body{padding:32px 22px 52px}}
@media(max-width:380px){.redirect-dest{display:none}}
</style>
</head>
<body>
<div class="controls"><div class="controls-inner"><button class="ctrl-btn" id="btn-theme" onclick="toggleTheme()">◐</button></div></div>
<header>
  <h1 class="name">url.<em style="font-style:normal;color:var(--accent);font-weight:300">lucafchala</em>.com</h1>
  <p class="micro">redirecionamentos permanentes</p>
</header>
<div class="hubs-section">
  <div class="rule">PÁGINAS</div>
  <div class="hubs-grid">
    <a class="hub" href="https://lucafchala.com" target="_blank" rel="noopener"><span class="hub-name">lucafchala.com</span><span class="hub-sub">página principal</span></a>
    <a class="hub" href="https://fotos.lucafchala.com" target="_blank" rel="noopener"><span class="hub-name">fotos</span><span class="hub-sub">portfólio fotográfico</span></a>
    <a class="hub" href="https://radio.lucafchala.com" target="_blank" rel="noopener"><span class="hub-name">rádio</span><span class="hub-sub">portal de rádio amateur</span></a>
    <a class="hub" href="https://paste.lucafchala.com" target="_blank" rel="noopener"><span class="hub-name">paste</span><span class="hub-sub">snippets &amp; textos</span></a>
    <a class="hub" href="https://dash.lucafchala.com" target="_blank" rel="noopener"><span class="hub-name">dash</span><span class="hub-sub">painel de controle</span></a>
    <a class="hub" href="https://keys.lucafchala.com" target="_blank" rel="noopener"><span class="hub-name">keys</span><span class="hub-sub">chaves SSH / PGP</span></a>
    <a class="hub" href="https://proof.lucafchala.com" target="_blank" rel="noopener"><span class="hub-name">proof</span><span class="hub-sub">prova de domínio</span></a>
    <a class="hub" href="https://status.lucafchala.com" target="_blank" rel="noopener"><span class="hub-name">status</span><span class="hub-sub">dashboard de serviços</span></a>
  </div>
</div>
<div class="rule">PURLS</div>
<div class="redirects-section"><div id="redirects-list"><p class="empty" style="color:var(--muted)">carregando…</p></div></div>
<script>
function toggleTheme(){const t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.setItem('theme',t)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function shortHost(url){try{const u=new URL(url);const h=u.hostname.replace(/^www\./,'');const p=u.pathname!=='/'?u.pathname.slice(0,14)+(u.pathname.length>15?'…':''):'';return h+p}catch{return url.slice(0,24)+'…'}}
const GROUP_LABELS={contact:'contato',events:'eventos',video:'vídeo',tools:'ferramentas'};
const ORDER=['contact','events','video','tools'];
const collapsed=new Set(['events','video']);
function toggleGroup(g){collapsed.has(g)?collapsed.delete(g):collapsed.add(g);render()}
let _data=[];
function render(){
  const grouped={};
  _data.forEach(r=>{const g=r.group||'tools';(grouped[g]=grouped[g]||[]).push(r)});
  const keys=[...ORDER.filter(k=>grouped[k]),...Object.keys(grouped).filter(k=>!ORDER.includes(k))];
  document.getElementById('redirects-list').innerHTML=keys.map(g=>{
    const col=collapsed.has(g);
    const rows=grouped[g].map(r=>`<div class="redirect-item">
      <span class="redirect-slug">/${esc(r.slug)}</span>
      <span class="redirect-dest" title="${esc(r.destination)}">${esc(shortHost(r.destination))}</span>
      <div class="redirect-actions">
        <button class="act-btn" onclick="doCopy(this)" data-slug="${esc(r.slug)}" data-url="https://url.lucafchala.com/${esc(r.slug)}">copiar</button>
        <a class="act-btn" href="${esc(r.destination)}" target="_blank" rel="noopener noreferrer">abrir</a>
      </div>
    </div>`).join('');
    return `<div class="group-header${col?' collapsed':''}" onclick="toggleGroup('${g}')">
      <span class="group-toggle">▾</span>
      ${esc(GROUP_LABELS[g]||g)}
      <span class="group-count">${grouped[g].length}</span>
    </div>
    <div class="group-items${col?' collapsed':''}">${rows}</div>`;
  }).join('');
}
function doCopy(btn){
  navigator.clipboard.writeText(btn.dataset.url).then(()=>{
    const orig=btn.textContent;btn.textContent='copiado!';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('ok')},2000);
  }).catch(()=>{});
}
function load(data){_data=data.redirects||[];render()}
fetch('/data.json').then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
  .then(load)
  .catch(()=>fetch('https://dash.lucafchala.com/data.json').then(r=>r.json()).then(load)
  .catch(()=>{document.getElementById('redirects-list').innerHTML='<p class="empty">erro ao carregar redirects.</p>'}));
</script>
</body>
</html>
